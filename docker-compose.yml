services:
  mysql:
    image: mysql:8.4
    container_name: caspian-eco-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-caspian_eco_monitor}
      MYSQL_USER: ${DB_USER:-caspian}
      MYSQL_PASSWORD: ${DB_PASSWORD:-caspian_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
    container_name: caspian-eco-backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend/frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: caspian-eco-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql-data:
